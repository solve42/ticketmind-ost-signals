name: Plugin Release

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo & Tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - if: startsWith(github.ref, 'refs/tags/')
        # We want only tags
        name: Resolve tag and verify it’s on main
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          
          VERSION=${{ github.ref_name }}
          
          git fetch origin main
          if COMMIT="$(git rev-parse --verify "${VERSION}^{commit}" 2>/dev/null)"; then
            echo "Commit: $COMMIT"
          else
            echo "Invalid or missing tag: $TAG"
            exit 1
          fi
          
          MAIN_COMMIT="$(git rev-parse --verify "origin/main^{commit}")"
          if [[ "$COMMIT" == "$MAIN_COMMIT" ]]; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${VERSION} does not point to origin/main HEAD; skipping release."
            echo "on_main=false" >> "$GITHUB_OUTPUT"
          fi

          ZIP_NAME="${{ github.event.repository.name }}-${VERSION}.zip"
          
          {
            echo "VERSION=${VERSION}"
            echo "ZIP_NAME=${ZIP_NAME}"
          } >> "$GITHUB_ENV"

      - if: startsWith(github.ref, 'refs/tags/') && (steps.meta.outputs.on_main == 'true')
        name: Update version in plugin.php → ${{ env.VERSION }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f plugin.php ]]; then
            echo "plugin.php not found in repo root. Adjust the workflow if it's elsewhere." >&2
            exit 1
          fi
          python3 .github/scripts/update_ost_plugin_version.py "${VERSION}"

      - if: startsWith(github.ref, 'refs/tags/') && (steps.meta.outputs.on_main == 'true')
        name: Build filtered zip
        shell: bash
        run: |
          set -euo pipefail
          rm -f "${ZIP_NAME}"
          
          zip -r "${ZIP_NAME}" . \
            -x ".git/*" \
               ".gitignore" \
               "scripts/*" "*/scripts/*" \
               ".github/*" "*/.github/*" \
               ".claude*" "*/.claude*" \
               ".vscode/*" "*/.vscode/*" \
               ".idea/*" "*/.idea/*" \
               "tests/*" "*/tests/*" \
               "docs/*" "*/docs/*" \
               "CLAUDE.md" \
               "composer.lock" \
               "*.sh" \
               ".DS_Store" "*/.DS_Store"
          ls -lah "${ZIP_NAME}"

      - if: startsWith(github.ref, 'refs/tags/') && (steps.meta.outputs.on_main == 'true')
        name: Extract top changelog entry and validate tag version
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f CHANGELOG.md ]]; then
            echo "CHANGELOG.md not found in repo root." >&2
            exit 1
          fi

          awk '
            BEGIN {
              in_section = 0
            }
            /^# / {
              if (in_section == 1) {
                exit
              }
              in_section = 1
            }
            in_section {
              print
            }
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [[ ! -s RELEASE_NOTES.md ]]; then
            echo "Top changelog entry is empty or missing." >&2
            exit 1
          fi

          FIRST_HEADING="$(head -n 1 RELEASE_NOTES.md)"
          CHANGELOG_VERSION="$(printf '%s\n' "${FIRST_HEADING}" | sed -nE 's/^# [0-9]{4}-[0-9]{2}-[0-9]{2} ([^[:space:]]+).*/\1/p')"

          if [[ -z "${CHANGELOG_VERSION}" ]]; then
            echo "Could not extract version from top changelog heading: ${FIRST_HEADING}" >&2
            exit 1
          fi

          if [[ "${CHANGELOG_VERSION}" != "${VERSION}" ]]; then
            echo "Top changelog version ${CHANGELOG_VERSION} does not match tag version ${VERSION}." >&2
            exit 1
          fi

          cat RELEASE_NOTES.md

      - if: startsWith(github.ref, 'refs/tags/') && (steps.meta.outputs.on_main == 'true')
        name: Create GitHub Release (tag push)
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ZIP_NAME }}
          body_path: RELEASE_NOTES.md
